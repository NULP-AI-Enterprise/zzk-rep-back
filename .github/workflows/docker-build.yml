name: Build & Push Docker Image

on:
  workflow_dispatch:

  push:
    branches: [main, master]
    paths:
      - "**/*.py"
      - "Dockerfile"
      - "requirements.txt"
      - "alembic.ini"
      - ".github/workflows/docker-build.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: nulp-ai-enterprise/zzk-rep-back

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit updated deployment.yaml back
      packages: write   # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pin image SHA in k8s deployments
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          for f in k8s/deployment.yaml k8s/deployment-celery.yaml k8s/deployment-celery-beat.yaml; do
            sed -i "s|image: ghcr.io/${{ env.IMAGE_NAME }}:.*|image: ${NEW_IMAGE}|" "$f"
          done
          echo "Pinned image → ${NEW_IMAGE}"

      - name: Commit updated deployments
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml k8s/deployment-celery.yaml k8s/deployment-celery-beat.yaml
          git diff --staged --quiet || \
            git commit -m "chore: pin image to sha-$(echo '${{ github.sha }}' | cut -c1-7) [skip ci]"
          git push
