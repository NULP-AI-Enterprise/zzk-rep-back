version: "3.9"

# ЗЗК Реєстр — Mac mini bare-metal deployment
# 1. cp .env.example .env  →  fill in values
# 2. make up

services:
  postgres:
    image: postgres:16-alpine
    container_name: zzk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zzk_db}
      POSTGRES_USER: ${POSTGRES_USER:-zzk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zzk} -d ${POSTGRES_DB:-zzk_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zzk-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/nulp-ai-enterprise/zzk-rep-back:latest
    container_name: zzk-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  celery:
    image: ghcr.io/nulp-ai-enterprise/zzk-rep-back:latest
    container_name: zzk-celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  celery-beat:
    image: ghcr.io/nulp-ai-enterprise/zzk-rep-back:latest
    container_name: zzk-celery-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
