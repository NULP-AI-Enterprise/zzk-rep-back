apiVersion: apps/v1
kind: Deployment
metadata:
  name: zzk-register
  namespace: zzk-register
  labels:
    app: zzk-register
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zzk-register
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zzk-register
      annotations:
        checksum/secret: "update-this-on-secret-change"
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/nulp-ai-enterprise/zzk-rep-back:sha-1729118
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: zzk-register-secret

      containers:
        - name: zzk-register
          # CI workflow pins this tag on every push to main
          image: ghcr.io/nulp-ai-enterprise/zzk-rep-back:sha-1729118
          command:
            - gunicorn
            - main:app
            - -w
            - "4"
            - -k
            - uvicorn.workers.UvicornWorker
            - -b
            - 0.0.0.0:8000
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: zzk-register-secret
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 18    # 18 × 10s = 3 min max startup
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          terminationMessagePolicy: FallbackToLogsOnError

      imagePullSecrets:
        - name: ghcr-pull-secret

      restartPolicy: Always
