apiVersion: apps/v1
kind: Deployment
metadata:
  name: zzk-postgres
  namespace: zzk-register
  labels:
    app: zzk-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zzk-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zzk-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zzk-register-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zzk-register-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zzk-register-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zzk-postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zzk-register
spec:
  type: ClusterIP
  selector:
    app: zzk-postgres
  ports:
    - port: 5432
      targetPort: 5432
